<!DOCTYPE html>
<html lang="en" data-theme="black">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to datastar.zig</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5.0.0-beta.8/daisyui.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" 
    src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.1/bundles/datastar.js"></script>

  <style type="text/tailwindcss">
    @layer utilities {
            /* A slow, floating animation for background elements */
            @keyframes float {
                0%, 100% { transform: translateY(0px) translateX(0px); }
                50% { transform: translateY(-20px) translateX(10px); }
            }
            .animate-float {
                animation: float 6s ease-in-out infinite;
            }
            
            /* A slower reverse float */
            .animate-float-reverse {
                animation: float 8s ease-in-out infinite reverse;
            }

            /* Neon text glow */
            .text-glow {
                text-shadow: 0 0 10px theme('colors.primary'), 0 0 20px theme('colors.primary');
            }
        }
    </style>
</head>

<body
  class="min-h-screen bg-[conic-gradient(at_bottom_left,_var(--tw-gradient-stops))] from-base-300 via-black to-base-300 overflow-hidden flex items-center justify-center font-sans relative">

  <div
    class="absolute top-0 left-0 w-96 h-96 bg-primary/30 rounded-full mix-blend-multiply filter blur-[128px] opacity-70 animate-float -z-10">
  </div>
  <div
    class="absolute bottom-0 right-0 w-96 h-96 bg-secondary/30 rounded-full mix-blend-multiply filter blur-[128px] opacity-70 animate-float-reverse -z-10">
  </div>


  <div class="hero relative z-10">
    <div
      class="hero-content text-center rounded-box bg-base-100/10 backdrop-blur-md border border-white/10 p-10 shadow-2xl animate__animated animate__fadeIn">
      <div class="max-w-xl">

        <div class="mb-8 flex justify-center animate__animated animate__fadeInDown animate__delay-1s">
          <div
            class="p-4 bg-base-200/50 rounded-full border border-primary/50 shadow-[0_0_30px_theme('colors.primary')] animate-pulse">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
              class="w-16 h-16 text-warning">
              <path fill-rule="evenodd"
                d="M14.615 1.595a.75.75 0 0 1 .359.852L12.982 9.75h7.268a.75.75 0 0 1 .548 1.262l-10.5 11.25a.75.75 0 0 1-1.272-.71l1.992-7.302H3.75a.75.75 0 0 1-.548-1.262l10.5-11.25a.75.75 0 0 1 .913-.143Z"
                clip-rule="evenodd" />
            </svg>
          </div>
        </div>

        <h1 class="mb-5 text-6xl font-extrabold animate__animated animate__zoomIn animate__delay-1s">
          Welcome to
          <span class="text-blue-600 bg-clip-text bg-gradient-to-r from-primary via-warning to-secondary text-glow">
            Datastar.zig
          </span>
        </h1>

        <p class="mb-8 text-xl text-base-content/80 animate__animated animate__fadeInUp animate__delay-2s">
          High-performance systems programming meets reactive hypermedia.
          <br class="hidden md:inline">Built for speed, multiplayer, and real-time updates.
        </p>

        <div class="flex gap-4 justify-center animate__animated animate__fadeInUp animate__delay-3s animate__faster"
          data-signals="{streamLabel: 'Start Streaming Now'}">
          <button data-text="$streamLabel" data-on:click="$streamLabel='I cant let you do that'"
            class="btn btn-primary btn-lg shadow-lg p-12 hover:shadow-[0_0_30px_theme('colors.primary')] hover:scale-105 transition-all duration-300 group">
            Content
          </button>
          <a href="https://data-star.dev" target="_blank"
            class="btn btn-ghost btn-lg p-12 border-base-content/20 hover:border-warning hover:text-warning hover:shadow-[inset_0_0_20px_theme('colors.warning')] transition-all duration-300">
            Documentation
          </a>
        </div>

      </div>
    </div>
  </div>

  <footer class="absolute bottom-4 text-sm text-base-content/50 animate__animated animate__fadeIn animate__delay-4s">
    <span class="flex items-center gap-2">
      <span class="relative flex h-3 w-3">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-success opacity-75"></span>
        <span class="relative inline-flex rounded-full h-3 w-3 bg-success"></span>
      </span>
      Zig 0.16.0 &bull; Datastar 1.0.1
    </span>
  </footer>

</body>

</html>
